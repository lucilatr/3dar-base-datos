<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Base de Datos — 3DAR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0e0e0e;--surface:#161616;--border:#252525;--pink:#FF0066;--white:#fff;--gray:#777;--light:#ccc}
body{background:var(--bg);color:var(--white);font-family:"Barlow",sans-serif;font-weight:300;min-height:100vh}

#login{display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-wrap{width:340px;display:flex;flex-direction:column;align-items:center}
.login-logo{margin-bottom:28px}
.login-logo img{width:140px;display:block}
.login-sub{font-family:"Barlow Condensed",sans-serif;font-size:11px;font-weight:700;letter-spacing:5px;text-transform:uppercase;color:var(--gray);margin-bottom:36px}
.login-wrap input[type=password]{width:100%;background:var(--surface);border:1px solid #333;color:var(--white);font-family:"Barlow",sans-serif;font-size:15px;font-weight:300;padding:14px 16px;outline:none;margin-bottom:10px;transition:border-color .2s}
.login-wrap input[type=password]:focus{border-color:var(--pink)}
.login-err{font-family:"Barlow Condensed",sans-serif;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--pink);margin-bottom:10px;display:none;align-self:flex-start}
.login-btn{width:100%;background:var(--pink);color:var(--white);border:none;cursor:pointer;font-family:"Barlow Condensed",sans-serif;font-size:12px;font-weight:700;letter-spacing:4px;text-transform:uppercase;padding:14px;transition:opacity .15s}
.login-btn:hover{opacity:.85}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

#main{display:none}
.site-header{position:sticky;top:0;z-index:100;background:#0a0a0a;border-bottom:1px solid var(--border);padding:0 60px;display:flex;align-items:center;gap:0}
.header-logo{padding:16px 0;border-right:1px solid var(--border);padding-right:32px;margin-right:32px;display:flex;align-items:center}
.header-logo img{width:56px;display:block}
.header-title{font-family:"Barlow Condensed",sans-serif;font-size:11px;font-weight:700;letter-spacing:5px;text-transform:uppercase;color:var(--gray);flex:1}
.export-btn{font-family:"Barlow Condensed",sans-serif;font-size:11px;font-weight:700;letter-spacing:4px;text-transform:uppercase;background:transparent;color:#777;border:1px solid #252525;padding:10px 18px;cursor:pointer;transition:all .15s;margin-right:10px}
.export-btn:hover{border-color:#444;color:#ccc}
.add-btn{font-family:"Barlow Condensed",sans-serif;font-size:11px;font-weight:700;letter-spacing:4px;text-transform:uppercase;background:#FF0066;color:#fff;border:none;padding:10px 20px;cursor:pointer;transition:opacity .15s;white-space:nowrap}
.add-btn:hover{opacity:.85}

.search-area{padding:48px 60px 32px;display:flex;flex-direction:column;align-items:center;gap:16px}
.search-row{display:flex;gap:10px;width:100%;max-width:760px}
.search-row input[type=text]{flex:1;background:var(--surface);border:1px solid var(--border);color:var(--white);font-family:"Barlow",sans-serif;font-size:14px;font-weight:300;padding:12px 16px;outline:none;transition:border-color .2s}
.search-row input[type=text]:focus{border-color:#444}
.search-row input[type=text]::placeholder{color:#444}
.search-row select{background:var(--surface);border:1px solid var(--border);color:var(--gray);font-family:"Barlow Condensed",sans-serif;font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;padding:12px 14px;outline:none;cursor:pointer}
.search-row select:hover{border-color:#444;color:var(--light)}

.chips-box{margin:0 60px;border:1px solid var(--border);padding:24px;display:flex;flex-wrap:wrap;gap:8px}
.chip{font-family:"Barlow Condensed",sans-serif;font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;padding:8px 18px;border:1px solid var(--border);color:var(--gray);cursor:pointer;background:transparent;transition:all .15s;white-space:nowrap}
.chip:hover{border-color:#444;color:var(--light)}
.chip.on{background:var(--pink);border-color:var(--pink);color:var(--white)}

.content{padding:32px 60px}

.loading{font-family:"Barlow Condensed",sans-serif;font-size:11px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:#444;padding:60px;text-align:center}
.sync-bar{font-family:"Barlow Condensed",sans-serif;font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#444;padding:0 60px 16px;display:flex;align-items:center;gap:12px}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#10b981;display:inline-block}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1px;background:var(--border);border:1px solid var(--border)}
.card{background:var(--bg);padding:24px 26px;transition:background .15s}
.card:hover{background:#121212}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.card-name{font-family:"Barlow Condensed",sans-serif;font-size:20px;font-weight:800;letter-spacing:-.5px;text-transform:uppercase;color:var(--white);line-height:1.1}
.card-role{font-family:"Barlow Condensed",sans-serif;font-size:10px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--pink);margin-top:4px}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.dot.av{background:#10b981}.dot.no{background:#FF0066}.dot.pt{background:#f59e0b}.dot.uk{background:#333}
.card-esp{font-family:"Barlow",sans-serif;font-size:13px;font-weight:300;color:var(--light);margin-bottom:12px;line-height:1.5}
.card-meta{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.meta-row{display:flex;align-items:baseline;gap:8px}
.meta-lbl{font-family:"Barlow Condensed",sans-serif;font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--pink);flex-shrink:0;width:32px}
.meta-val{font-family:"Barlow",sans-serif;font-size:12px;font-weight:300;color:var(--light)}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:14px}
.tag{font-family:"Barlow Condensed",sans-serif;font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--gray);border:1px solid var(--border);padding:3px 8px}
.card-actions{display:flex;gap:6px;padding-top:14px;border-top:1px solid var(--border)}
.btn{font-family:"Barlow Condensed",sans-serif;font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;padding:7px 12px;cursor:pointer;display:inline-flex;align-items:center;text-decoration:none;transition:all .15s;border:none}
.btn-p{background:var(--pink);color:var(--white)}.btn-p:hover{opacity:.85}
.btn-o{background:transparent;border:1px solid var(--border);color:var(--gray)}.btn-o:hover{border-color:#444;color:var(--light)}
.btn-g{background:transparent;border:1px solid var(--border);color:var(--gray)}.btn-g:hover{border-color:#444;color:var(--light)}
.empty{grid-column:1/-1;padding:80px 40px;text-align:center;font-family:"Barlow Condensed",sans-serif;font-size:13px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:#333}

.field-group{margin-bottom:18px}
.field-label{font-family:"Barlow Condensed",sans-serif;font-size:10px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:#FF0066;margin-bottom:6px}
.modal-input{width:100%;background:#0e0e0e;border:1px solid #333;color:#fff;font-family:"Barlow",sans-serif;font-size:14px;font-weight:300;padding:10px 14px;outline:none;transition:border-color .2s}
.modal-input:focus{border-color:#FF0066}
.modal-save{font-family:"Barlow Condensed",sans-serif;font-size:11px;font-weight:700;letter-spacing:4px;text-transform:uppercase;background:#FF0066;color:#fff;border:none;padding:12px 28px;cursor:pointer;transition:opacity .15s}
.modal-save:hover{opacity:.85}
.modal-cancel{font-family:"Barlow Condensed",sans-serif;font-size:11px;font-weight:700;letter-spacing:4px;text-transform:uppercase;background:transparent;color:#777;border:1px solid #252525;padding:12px 20px;cursor:pointer;transition:all .15s}
.modal-cancel:hover{color:#ccc;border-color:#444}

@media(max-width:768px){
  .site-header,.search-area,.chips-box,.content,.sync-bar{padding-left:20px;padding-right:20px}
  .chips-box{margin:0 20px}
}

.btn-del{background:transparent;border:1px solid #333;color:#444;font-family:"Barlow Condensed",sans-serif;font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;padding:7px 10px;cursor:pointer;transition:all .15s;margin-left:auto}
.btn-del:hover{border-color:#FF0066;color:#FF0066}
</style>
</head>

// ── SHEETS LOADER ────────────────────────────────────────
function csvToRows(text) {
  const lines = text.trim().split(/\r?\n/);
  if(lines.length < 2) return [];
  const headers = parseCSVLine(lines[0]).map(function(h){ return h.toLowerCase().trim(); });
  return lines.slice(1).map(function(line){
    const vals = parseCSVLine(line);
    const obj = {};
    headers.forEach(function(h, i){ obj[h] = (vals[i] || "").trim(); });
    return obj;
  }).filter(function(r){ return r["nombre"] || r["name"]; });
}

function parseCSVLine(line) {
  const result = [];
  let cur = "", inQ = false;
  for(let i = 0; i < line.length; i++){
    const c = line[i];
    if(c === '"'){ inQ = !inQ; }
    else if(c === ',' && !inQ){ result.push(cur); cur = ""; }
    else { cur += c; }
  }
  result.push(cur);
  return result;
}

function normalizeRow(row, rolLabel) {
  const nombre = row["nombre.1"] || row["nombre"] || row["name"] || "";
  if(!nombre) return null;
  return {
    n: nombre,
    m: row["mail"] || row["email"] || "",
    t: row["teléfono"] || row["telefono"] || row["phone"] || "",
    w: row["web"] || row["website"] || "",
    r: rolLabel,
    e: row["especialidad"] || "",
    k: row["tags"] || row["keywords"] || row["comments"] || "",
    d: row["respuestas"] || row["disponibilidad"] || "",
  };
}

async function loadFromSheets() {
  // Use gviz API to get list of sheets
  const metaUrl = "https://docs.google.com/spreadsheets/d/" + SHEET_ID + "/gviz/tq?tqx=out:json&tq=SELECT%20*%20LIMIT%200";
  
  // Load each known sheet by name using the CSV export
  const sheetNames = Object.keys(ROLE_MAP);
  const loaded = [];
  
  for(let i = 0; i < sheetNames.length; i++){
    const sheetName = sheetNames[i];
    const rolLabel = ROLE_MAP[sheetName];
    const url = "https://docs.google.com/spreadsheets/d/" + SHEET_ID + "/gviz/tq?tqx=out:csv&sheet=" + encodeURIComponent(sheetName);
    try {
      const resp = await fetch(url);
      if(!resp.ok) continue;
      const text = await resp.text();
      if(text.includes("Error") || text.length < 10) continue;
      const rows = csvToRows(text);
      rows.forEach(function(row){
        const p = normalizeRow(row, rolLabel);
        if(p) loaded.push(p);
      });
    } catch(e){ /* skip failed sheet */ }
  }
  
  if(loaded.length > 50) {
    DATA = loaded;
  }
  return loaded.length;
}

async function reloadFromSheets() {
  document.getElementById("sync-text").textContent = "Sincronizando con Google Sheets...";
  const count = await loadFromSheets();
  const now = new Date();
  const timeStr = now.getHours() + ":" + String(now.getMinutes()).padStart(2,"0");
  document.getElementById("sync-text").textContent = count + " personas · actualizado " + timeStr;
  buildChips();
  render();
}

// ── UI ───────────────────────────────────────────────────
function dot(d){
  if(!d) return "uk";
  const v = d.toLowerCase();
  if(v.includes("no dispo")) return "no";
  if(v.includes("part")) return "pt";
  if(v.includes("dispo") || v.includes("yes")) return "av";
  return "uk";
}
function dotTip(d){
  if(!d) return "Sin info";
  const v = d.toLowerCase();
  if(v.includes("no dispo")) return "No disponible";
  if(v.includes("part")) return "Part time";
  if(v.includes("dispo")) return "Disponible";
  return d;
}

function buildChips(){
  const roles = [...new Set(DATA.map(function(d){ return d.r; }))].sort();
  const container = document.getElementById("chips");
  container.innerHTML = "";
  roles.forEach(function(r){
    const btn = document.createElement("button");
    btn.className = "chip" + (activeRole === r ? " on" : "");
    btn.textContent = r;
    btn.onclick = function(){ setRole(r, btn); };
    container.appendChild(btn);
  });
}

function setRole(r, el){
  activeRole = r;
  document.getElementById("q").value = "";
  document.querySelectorAll(".chip").forEach(function(c){ c.classList.remove("on"); });
  el.classList.add("on");
  render();
}

function onSearch(){
  activeRole = "";
  document.querySelectorAll(".chip").forEach(function(c){ c.classList.remove("on"); });
  render();
}

function render(){
  const q = document.getElementById("q").value.trim().toLowerCase();
  const avail = document.getElementById("favail").value;
  if(!activeRole && !q){ document.getElementById("grid").innerHTML = ""; return; }

    if(activeRole && d.r !== activeRole) return false;
    if(avail){
      const dc = dot(d.d);
      if(avail === "disponible" && dc !== "av") return false;
      if(avail === "part" && dc !== "pt") return false;
      if(avail === "no" && dc !== "no") return false;
    }
    if(q){
      const hay = [d.n, d.r, d.e, d.k, d.d].join(" ").toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
  const grid = document.getElementById("grid");
  if(!list.length){ grid.innerHTML = '<div class="empty">Sin resultados</div>'; return; }
  grid.innerHTML = list.map(function(d){
    const dc = dot(d.d);
    const tags = (d.k || "").split(/[,;]/).map(function(t){ return t.trim(); }).filter(Boolean).slice(0,5);
    const esp = d.e ? '<div class="card-esp">' + d.e + '</div>' : "";
    const tagHtml = tags.length ? '<div class="tags">' + tags.map(function(t){ return '<span class="tag">' + t + '</span>'; }).join("") + '</div>' : "";
    let webUrl = "";
    if(d.w){ webUrl = d.w.startsWith("http") ? d.w : d.w.startsWith("www") ? "https://" + d.w : d.w; }
    const portfolio = webUrl ? '<a href="' + webUrl + '" class="btn btn-o" target="_blank">Portfolio</a>' : '<span class="btn btn-o" style="opacity:.3;cursor:default">Sin portfolio</span>';
    const mail = d.m ? '<a href="mailto:' + d.m + '" class="btn btn-p">Mail</a>' : "";
    const tel = d.t ? '<a href="tel:' + d.t + '" class="btn btn-g">' + d.t + '</a>' : "";
    const meta = (d.m || d.t) ? '<div class="card-meta">' + (d.m ? '<div class="meta-row"><span class="meta-lbl">Mail</span><span class="meta-val">' + d.m + '</span></div>' : "") + (d.t ? '<div class="meta-row"><span class="meta-lbl">Tel</span><span class="meta-val">' + d.t + '</span></div>' : "") + '</div>' : "";
    var cardId = 'card-' + Math.random().toString(36).substr(2,9);
    return '<div class="card" id="' + cardId + '"><div class="card-top"><div><div class="card-name">' + d.n + '</div><div class="card-role">' + d.r + '</div></div><div class="dot ' + dc + '" title="' + dotTip(d.d) + '"></div></div>' + esp + tagHtml + meta + '<div class="card-actions">' + portfolio + mail + tel + '<button class="btn btn-del" onclick="deleteArtist(\'' + d.n.replace(/\'/g,\'\\\'\')+\'\', \'' + d.r.replace(/\'/g,\'\\\'\')+\'\', document.getElementById(\'' + cardId + '\'))">✕ Eliminar</button></div></div>';
  }).join("");
}

// ── ADD ARTIST ───────────────────────────────────────────
function openModal(){
  const sel = document.getElementById("f-rol");
  sel.innerHTML = '<option value="">— Seleccionar —</option>';
  const roles = [...new Set(DATA.map(function(d){ return d.r; }))].sort();
  roles.forEach(function(r){
    const o = document.createElement("option");
    o.value = r; o.textContent = r;
    sel.appendChild(o);
  });
  document.getElementById("modal-overlay").style.display = "block";
  document.getElementById("modal").style.display = "block";
  document.getElementById("modal-msg").style.display = "none";
  document.getElementById("f-nombre").focus();
}

function closeModal(){
  document.getElementById("modal-overlay").style.display = "none";
  document.getElementById("modal").style.display = "none";
  ["f-nombre","f-mail","f-tel","f-web","f-tags"].forEach(function(id){ document.getElementById(id).value = ""; });
  document.getElementById("f-rol").value = "";
}

async function saveArtist(){
  const nombre = document.getElementById("f-nombre").value.trim();
  const rol    = document.getElementById("f-rol").value;
  const mail   = document.getElementById("f-mail").value.trim();
  const tel    = document.getElementById("f-tel").value.trim();
  const web    = document.getElementById("f-web").value.trim();
  const tags   = document.getElementById("f-tags").value.trim();

  if(!nombre || !rol){
    const msg = document.getElementById("modal-msg");
    msg.textContent = "Nombre y rol son requeridos";
    msg.style.display = "block";
    return;
  }

  // Show saving state
  const saveBtn = document.querySelector(".modal-save");
  saveBtn.textContent = "Guardando...";
  saveBtn.style.opacity = "0.6";
  saveBtn.disabled = true;

  try {
    const payload = { nombre:nombre, rol:rol, mail:mail, telefono:tel, web:web, tags:tags };
    await fetch(SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    // Add to local DATA immediately so it shows up now
    const nuevo = { n:nombre, m:mail, t:tel, w:web, r:rol, e:"", k:tags, d:"" };
    DATA.push(nuevo);
    buildChips();
    document.querySelectorAll(".chip").forEach(function(c){
      if(c.textContent.trim() === rol) setRole(rol, c);
    });
    closeModal();

    // Flash confirm on button
    const addBtn = document.querySelector(".add-btn");
    const orig = addBtn.textContent;
    addBtn.textContent = "✓ Guardado en Sheets";
    addBtn.style.background = "#10b981";
    setTimeout(function(){ addBtn.textContent = orig; addBtn.style.background = ""; }, 2500);

    // Update sync bar
    document.getElementById("sync-bar").style.display = "flex";
    document.getElementById("sync-text").textContent = nombre + " agregado y guardado en Google Sheets";

  } catch(err) {
    const msg = document.getElementById("modal-msg");
    msg.textContent = "Error al guardar. Intentá de nuevo.";
    msg.style.display = "block";
  } finally {
    saveBtn.textContent = "Guardar";
    saveBtn.style.opacity = "1";
    saveBtn.disabled = false;
  }
}

// ── EXPORT ───────────────────────────────────────────────
function exportCSV(){
  const roles = [...new Set(DATA.map(function(d){ return d.r; }))].sort();
  function esc(v){ if(!v) return ""; v = String(v).replace(/"/g,'\"'); if(v.includes(",") || v.includes('"') || v.includes("\n")) v = '"' + v + '"'; return v; }
  const rows = [["Nombre","Mail","Telefono","Web","Especialidad","Tags","Disponibilidad","Rol"].join(",")];
  roles.forEach(function(r){
    DATA.filter(function(d){ return d.r === r; }).forEach(function(d){
      rows.push([esc(d.n),esc(d.m),esc(d.t),esc(d.w),esc(d.e),esc(d.k),esc(d.d),esc(d.r)].join(","));
    });
  });
  const blob = new Blob([rows.join("\n")], { type:"text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "3dar_base_datos_" + new Date().toISOString().slice(0,10) + ".csv";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ── LOGIN ────────────────────────────────────────────────
function login(){
  const pwd = document.getElementById("pwd");
  if(pwd.value === PASS){
    sessionStorage.setItem("3dar_ok","1");
    showMain();
  } else {
    document.getElementById("err").style.display = "block";
    pwd.classList.add("shake");
    setTimeout(function(){ pwd.classList.remove("shake"); }, 400);
    pwd.value = "";
  }
}

async function showMain(){
  document.getElementById("login").style.display = "none";
  document.getElementById("main").style.display = "block";
  buildChips();
  // Load live from Sheets
  const count = await loadFromSheets();
  if(count > 0){
    const now = new Date();
    const timeStr = now.getHours() + ":" + String(now.getMinutes()).padStart(2,"0");
    document.getElementById("sync-bar").style.display = "flex";
    document.getElementById("sync-text").textContent = count + " personas · sincronizado " + timeStr;
    buildChips();
    render();
  }
}

window.onload = function(){
  if(sessionStorage.getItem("3dar_ok") === "1") showMain();
};

async function deleteArtist(nombre, rol, cardEl) {
  if(!confirm('Eliminar a ' + nombre + ' de la base de datos?')) return;

  // Remove from local DATA
  var idx = DATA.findIndex(function(d){ return d.n === nombre && d.r === rol; });
  if(idx !== -1) DATA.splice(idx, 1);

  // Remove card from UI immediately
  cardEl.style.opacity = '0.3';
  cardEl.style.pointerEvents = 'none';
  setTimeout(function(){ cardEl.remove(); }, 400);

  // Delete from Google Sheets
  try {
    var url = SCRIPT_URL + '?action=delete&nombre=' + encodeURIComponent(nombre) + '&rol=' + encodeURIComponent(rol);
    await fetch(url, { mode: 'no-cors' });
  } catch(err) {
    console.log('Delete request sent');
  }
}
